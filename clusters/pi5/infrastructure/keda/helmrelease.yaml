apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
  namespace: keda
spec:
  interval: 1h
  chart:
    spec:
      chart: keda
      version: ">=2.16.0 <3.0.0"
      sourceRef:
        kind: HelmRepository
        name: kedacore
        namespace: keda
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
