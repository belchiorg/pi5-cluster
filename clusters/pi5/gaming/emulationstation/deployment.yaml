apiVersion: apps/v1
kind: Deployment
metadata:
  name: emulationstation
  namespace: gaming
spec:
  replicas: 1
  selector:
    matchLabels:
      app: emulationstation
  template:
    metadata:
      labels:
        app: emulationstation
    spec:
      hostPID: true
      nodeSelector:
        kubernetes.io/hostname: belchior-pi
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        supplementalGroups: [44, 46, 992, 996]  # video, plugdev, render, input
      containers:
        - name: emulationstation
          image: ghcr.io/belchiorg/emulationstation:latest
          imagePullPolicy: Always
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
          env:
            - name: WAYLAND_DISPLAY
              value: wayland-0
            - name: XDG_RUNTIME_DIR
              value: /run/user/1000
            - name: SDL_VIDEODRIVER
              value: wayland
            - name: EGL_PLATFORM
              value: wayland
            - name: MESA_LOADER_DRIVER_OVERRIDE
              value: v3d
            - name: QT_QPA_PLATFORM
              value: wayland
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "3500m"
              memory: "2Gi"
          volumeMounts:
            - name: xdg-runtime
              mountPath: /run/user/1000
            - name: snd
              mountPath: /dev/snd
            - name: config
              mountPath: /config
            - name: roms
              mountPath: /roms
            - name: dri
              mountPath: /dev/dri
            - name: input
              mountPath: /dev/input
            - name: pcsx2
              mountPath: /opt/pcsx2
            - name: bios
              mountPath: /bios
            - name: dshm
              mountPath: /dev/shm
            - name: pcsx2-wrapper
              mountPath: /usr/local/bin/pcsx2-qt
              subPath: pcsx2-qt
      volumes:
        - name: xdg-runtime
          hostPath:
            path: /run/user/1000
            type: Directory
        - name: snd
          hostPath:
            path: /dev/snd
            type: Directory
        - name: config
          hostPath:
            path: /mnt/data/es-config
            type: Directory
        - name: roms
          hostPath:
            path: /mnt/data/roms
            type: Directory
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
        - name: input
          hostPath:
            path: /dev/input
            type: Directory
        - name: pcsx2
          hostPath:
            path: /opt/pcsx2
            type: Directory
        - name: bios
          hostPath:
            path: /mnt/data/bios
            type: Directory
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
        - name: pcsx2-wrapper
          configMap:
            name: pcsx2-wrapper
            defaultMode: 0755
