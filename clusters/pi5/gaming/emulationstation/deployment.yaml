apiVersion: apps/v1
kind: Deployment
metadata:
  name: emulationstation
  namespace: gaming
spec:
  replicas: 1
  selector:
    matchLabels:
      app: emulationstation
  template:
    metadata:
      labels:
        app: emulationstation
    spec:
      nodeSelector:
        kubernetes.io/hostname: belchior-pi
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        supplementalGroups: [44, 46, 992, 996]  # video, plugdev, render, input
      containers:
        - name: emulationstation
          image: ghcr.io/belchiorg/emulationstation:latest
          imagePullPolicy: Always
          env:
            - name: WAYLAND_DISPLAY
              value: wayland-0
            - name: XDG_RUNTIME_DIR
              value: /run/user/1000
            - name: SDL_VIDEODRIVER
              value: wayland
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "3500m"
              memory: "2Gi"
          volumeMounts:
            - name: xdg-runtime
              mountPath: /run/user/1000
            - name: snd
              mountPath: /dev/snd
            - name: config
              mountPath: /config
            - name: roms
              mountPath: /roms
            - name: dri
              mountPath: /dev/dri
            - name: input
              mountPath: /dev/input
      volumes:
        - name: xdg-runtime
          hostPath:
            path: /run/user/1000
            type: Directory
        - name: snd
          hostPath:
            path: /dev/snd
            type: Directory
        - name: config
          hostPath:
            path: /mnt/data/es-config
            type: Directory
        - name: roms
          hostPath:
            path: /mnt/data/roms
            type: Directory
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
        - name: input
          hostPath:
            path: /dev/input
            type: Directory
