apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: emulationstation
  namespace: gaming
spec:
  scaleTargetRef:
    name: emulationstation
  minReplicaCount: 0
  maxReplicaCount: 1
  # Wait 5 minutes after the controller disconnects before scaling down.
  # This avoids tearing down ES-DE mid-save on a brief disconnect.
  cooldownPeriod: 300
  pollingInterval: 5
  fallback:
    failureThreshold: 3
    replicas: 0
  triggers:
    - type: metrics-api
      metadata:
        targetValue: "1"
        activationValue: "0.5"
        url: "http://bt-watcher.gaming.svc.cluster.local:8080/metric"
        valueLocation: "value"
