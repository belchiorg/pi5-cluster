apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: game-operator-role
rules:
  - apiGroups: ["gaming.home"]
    resources: ["games"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gaming.home"]
    resources: ["games/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["gaming.home"]
    resources: ["games/finalizers"]
    verbs: ["update"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: game-operator-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: game-operator-role
subjects:
  - kind: ServiceAccount
    name: game-operator
    namespace: gaming
